name: smoke

# The merge gate. Runs the full automated suite on every PR and on pushes to
# non-main branches. Branch protection on `main` requires this job to pass
# before a PR can merge, so broken code can't reach production.
#   sanity      — fast JS parse of every inline <script> (no browser)
#   docs-check  — fail if the docs drift from the code (version/UIMAP/links)
#   smoke       — core coach journey in headless Chromium
#   sports      — every sport/format played to summary
#   edge        — save/resume, injury, live roster edits, cadence, etc.
# Screenshots from all suites are uploaded as an artifact for triage.
on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sanity (JS parse)
        run: npm run sanity

      - name: Docs drift check
        run: npm run docs-check

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke (core journey)
        run: npm run smoke

      - name: Sports matrix (all formats)
        run: npm run sports

      - name: Edge cases
        run: npm run edge

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: test/screenshots/
          if-no-files-found: ignore
          retention-days: 14
